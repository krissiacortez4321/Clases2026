<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>registro</title>
    <script 
    src="https://tailwindcss.com">
</script>
</head>

<body class="bg-gray-100 p-5">



<div class="container"> 
    <h2 class="text-x1 font-bold mb-4">Registro de usuario</h2>

    <form id="registroForm" class="bg-white p-4 rounded shadow w-64">
    
        <label>Nombre</label>
        <input type="text" id="nombre" required class="border w-full mb-2 p-1"><br

        <label>Correo</label>
        <input type="email" id="email" required class="border w.full mb-2 p-1"><br>

        <label>Contraseña</label>
        <input type="password" id="password" required class="border w.full mb-2 p-1"><br>

        <button type="submit" class="bg-blue-500 text-white w-full p-1 mt-2">Registrarse</button>
    </form>
    <br>
</div>
</body>
</html>
