<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sesion</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> 
</head>
<body class=" mb-4 ms-3">
    <h2>Registro</h2>

    <form id="formulario" style="max-width: 400px;">
        <input type="text" id="nombre" class="form-control mb-2" placeholder="Nombre">
        <small id="errorNombre"></small>

        <input type="text" id="correo" class="form-control mb-2" placeholder="Email">
        <small id="errorEmail" class="text-danger"></small>

        <input type="number" id="edad"class="form-control mb-2" placeholder="Edad">
        <small id="errorEdad" class="text-danger"></small>

        <input type="password" id="password" class="form-control mb-2" placeholder="Contraseña">
        <small id="errorPassword" class="text-danger"></small>

        <textarea id="descripcion" class="form-control mb-2" placeholder="Descripción"></textarea>

        <button type="submit" class="btn btn-primary">Registrarse</button>
    </form>

    <hr>

    <h3 class="mb-4">Registros actualmente</h3>

     <table id="tablaUsuarios" class=" table table-striped table-hover" 
     style="max-width:900px; display:none;">
<thead class="table-primary">
    <tr>
        <th>Nombre</th>
        <th>Correo</th>
        <th>Edad</th>
        <th>Descripcion</th>
        <th>Accion</th>
    </tr>
</thead>
<tbody id="cuerpoTabla"></tbody>
     </table>

    <script src="validacion.js"></script>

</body>
</html>
